{
  "profile": "dev-awbc",
  "sim_core": {
    "command": [
      "node",
      "dist/src/server.js"
    ],
    "cwd": "../sim-core"
  },
  "dataset": {
    "shard_path": "../data/shards/gen9randombattle_bc.dev.npz"
  },
  "training": {
    "objective": "advantage_weighted_bc",
    "use_sample_weights": true,
    "beta": 1.0,
    "min_sample_weight": 0.1,
    "max_sample_weight": 2.0,
    "value_loss_weight": 0.5,
    "entropy_bonus_weight": 0.01,
    "batch_size": 128,
    "epochs": 3,
    "hidden_sizes": [256, 256],
    "learning_rate": 0.001,
    "weight_decay": 0.0001,
    "train_split": 0.9,
    "resume": false,
    "best_checkpoint_path": "../artifacts/checkpoints/gen9randombattle_bc.awbc.dev.best.pt",
    "checkpoint_path": "../artifacts/checkpoints/gen9randombattle_bc.awbc.dev.pt"
  }
}
